<section class="inss section-paper" id="atuacoes-inss">
  <div class="container">
    <p class="eyebrow">Benefícios previdenciários</p>
    <h2>Minhas atuações junto ao INSS</h2>
    <p class="inss__lead">
      Acompanhamento completo de requerimentos, perícias e recursos administrativos
      nos principais benefícios do Instituto Nacional do Seguro Social.
    </p>

    <ul class="inss-grid">
      <li class="inss-card" *ngFor="let item of items">
        <span class="inss-card__icon" [ngSwitch]="item.icon">
          <svg *ngSwitchCase="'bpc'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3l7 3v5c0 4.5-3 8.2-7 9.5-4-1.3-7-5-7-9.5V6l7-3z"/><path d="M9.5 12l1.8 1.8L14.8 10"/></svg>
          <svg *ngSwitchCase="'maternidade'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="3.2"/><path d="M12 11.2V15m-3 5.5c0-2.2 1.4-4 3-4s3 1.8 3 4"/></svg>
          <svg *ngSwitchCase="'aposentadoria'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3.5" y="4.5" width="17" height="16" rx="1.5"/><path d="M3.5 9h17M8 3v3m8-3v3"/><path d="M8.5 13.5l2.2 2.2L15.5 12"/></svg>
          <svg *ngSwitchCase="'doenca'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="8.5"/><path d="M12 8v8M8 12h8"/></svg>
          <svg *ngSwitchCase="'pensao'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8.3" cy="8" r="2.6"/><circle cx="16" cy="9" r="2.1"/><path d="M3 19c0-3 2.3-5.3 5.3-5.3S13.6 16 13.6 19M14 19c0-2-1-3.7-3-4.6"/></svg>
          <svg *ngSwitchCase="'acidente'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2.5l1.9 4.6 4.9.5-3.7 3.4 1 4.9L12 13.7l-4.1 2.2 1-4.9-3.7-3.4 4.9-.5z"/></svg>
        </span>
        <h3>{{ item.label }}</h3>
        <p>{{ item.description }}</p>
      </li>
    </ul>
  </div>
</section>
