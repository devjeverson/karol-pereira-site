<header class="site-header" [class.is-scrolled]="scrolled()">
  <div class="container site-header__bar">
    <a class="brand" href="#inicio" (click)="closeMenu()">
      <img class="brand__seal" src="assets/images/logo-karol.jpg" alt="Karol Pereira Advocacia" width="40" height="40" />
      <span class="brand__text">
        <strong>Karol Pereira</strong>
        <small>Advocacia</small>
      </span>
    </a>

    <nav class="nav" [class.is-open]="menuOpen()" aria-label="Navegação principal">
      <a *ngFor="let link of links" [href]="link.href" (click)="closeMenu()">{{ link.label }}</a>
      <a class="nav__cta btn btn--gold" href="https://wa.me/5511999999999" target="_blank" rel="noopener" (click)="closeMenu()">
        Agendar consulta
      </a>
    </nav>

    <button
      class="menu-toggle"
      type="button"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Abrir menu de navegação"
      (click)="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
